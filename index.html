   <body>
       <header>
            <h3>Amazon</h3>
       </header>    

       <div class="container">
           <div class="row">
              <div class="col-md-8  offset-md-3 mt-4" >
                  <div class="card">
                     <div class="card-header bg-primary text-center">
                          <h4 class="text-light "> Shoping Cart</h4>
                     </div>
                    <div class="card-body">
                        <form action="" id="productForm">
                            <div class="form-group">
                              <label for="title">Title<span class="text-danger">*</span></label>
                              <input type="text" required class="form-control" id="title">
                            </div>
       
                            <div class="form-group">
                              <label for="description">Description<span class="text-danger">*</span></label>
                              <textarea rows="4" class="form-control" id="description">
                               </textarea>
                            </div>
                              
                            <div class="form-group">
                               <label for="price">Price<span class="text-danger">*</span></label>
                               <input type="number" required class="form-control" id="price">
                            </div>
                                
                            <div class="form-group">
                               <label for="image">Product image<span class="text-danger">*</span></label>
                               <input type="url"  required class="form-control" id="image">
                            </div>

                            <div class="form-group">
                                <button class="btn btn-block btn-outline-primary" id="addProduct"><i class="fa-solid fa-plus"></i> Add Product</button>
                                <button class="btn btn-block btn-outline-primary d-none" id="updateProduct" type="button"><i class="fa-solid fa-plus"></i> Update Product</button>
                                 
                            </div>
                        </form>
                           
                          
                    </div>
                 </div> 


              </div>
           </div>     
    </div>
